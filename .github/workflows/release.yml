name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Validate tag, package version, changelog, and publication boundaries
        run: python3 scripts/check-release-readiness.py "$GITHUB_REF_NAME"

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore with NuGet audit
        run: dotnet restore FreeAgent.slnx --nologo

      - name: Build
        run: dotnet build FreeAgent.slnx -c Release --no-restore --nologo

      - name: Test
        run: dotnet test FreeAgent.slnx -c Release --no-build --no-restore --nologo

      - name: Confirm no vulnerable NuGet packages
        run: dotnet list FreeAgent.slnx package --vulnerable --include-transitive --no-restore

      - name: Install locked TUI dependencies
        working-directory: clients/tui
        run: bun install --frozen-lockfile

      - name: Test TUI
        working-directory: clients/tui
        run: bun test

      - name: Typecheck TUI
        working-directory: clients/tui
        run: bun run typecheck

      - name: Pack global tool
        run: >-
          dotnet pack src/FreeAgent.Host -c Release --no-build --no-restore
          -p:Version=${{ steps.ver.outputs.version }} -o dist --nologo

      - name: Verify and smoke-install package
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          nupkg="dist/FreeAgent.${VERSION}.nupkg"
          test -f "$nupkg"
          unzip -p "$nupkg" FreeAgent.nuspec | grep -F '<license type="expression">Apache-2.0</license>'
          unzip -l "$nupkg" | grep -F 'README.md'
          unzip -l "$nupkg" | grep -F 'LICENSE'
          unzip -l "$nupkg" | grep -F 'NOTICE'
          dotnet tool install --tool-path smoke --add-source dist FreeAgent \
            --version "$VERSION" --ignore-failed-sources
          smoke/freeagent --version | grep -F "freeagent $VERSION"
          smoke/freeagent --help >/dev/null

      - name: Publish self-contained binaries
        run: |
          set -euo pipefail
          for rid in linux-x64 osx-arm64 win-x64; do
            echo "Publishing $rid…"
            dotnet publish src/FreeAgent.Host -c Release -r "$rid" --self-contained true \
              -p:PublishSingleFile=true -p:Version=${{ steps.ver.outputs.version }} \
              -o "publish/$rid" --nologo
            if [ "$rid" = "win-x64" ]; then
              cp "publish/$rid/FreeAgent.Host.exe" "dist/freeagent-$rid.exe"
            else
              cp "publish/$rid/FreeAgent.Host" "dist/freeagent-$rid"
            fi
          done

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum ./*.nupkg ./freeagent-* > SHA256SUMS

      - name: Publish to NuGet (if a key is configured)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -n "${NUGET_API_KEY:-}" ]; then
            dotnet nuget push dist/*.nupkg --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json --skip-duplicate
          else
            echo "NUGET_API_KEY not set; skipping NuGet publish (binaries + nupkg still attached to the release)."
          fi

      - name: Create GitHub Release and attach assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*.nupkg
            dist/freeagent-linux-x64
            dist/freeagent-osx-arm64
            dist/freeagent-win-x64.exe
            dist/SHA256SUMS
          generate_release_notes: true
