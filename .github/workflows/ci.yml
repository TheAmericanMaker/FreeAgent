name: ci

# Build and test on every push and pull request. The build treats warnings as errors and the
# test suite runs entirely against fakes (no network, model, or real filesystem), so a green run
# here is a real signal. Release packaging lives in release.yml (tag-triggered).
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build FreeAgent.slnx -c Release --nologo

      - name: Test
        run: dotnet test FreeAgent.slnx -c Release --no-build --nologo
